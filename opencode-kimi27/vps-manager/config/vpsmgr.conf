# vpsmgr.conf — centralized tunables
# Sourced by bash scripts and parsed by the Python API.
# Keep every setting as KEY="value" or KEY=value on its own line.

# ---------------------------------------------------------------------------
# Version resolution rules (no literal version numbers)
# ---------------------------------------------------------------------------
PHP_RESOLVE_RULE="latest-plus-previous-minor"
PHP_FALLBACK_RULE="previous-minor"
CADDY_APT_CHANNEL="stable"
MARIADB_SETUP_URL="https://downloads.mariadb.com/MariaDB/mariadb_repo_setup"
POSTGRESQL_APT_REPO="https://apt.postgresql.org/pub/repos/apt"
VALKEY_GITHUB_REPO="valkey-io/valkey"
WPCLI_GITHUB_REPO="wp-cli/wp-cli"
WORDPRESS_SALT_URL="https://api.wordpress.org/secret-key/1.1/salt/"

# ---------------------------------------------------------------------------
# Runtime paths
# ---------------------------------------------------------------------------
SITES_ROOT="/home"
WEBROOT_SUBDIR="public"
LOG_DIR="/var/log/vpsmgr"
STATE_DIR="/var/lib/vpsmgr/sites"
BACKUP_DIR="/var/backups/vpsmgr"
BOOTSTRAP_STATE="/var/lib/vpsmgr/bootstrap.json"
CADDY_SITES_DIR="/etc/caddy/sites"
CADDY_GLOBAL_CONFIG="/etc/caddy/Caddyfile"
PHP_POOL_DIR_TEMPLATE="/etc/php/%s/fpm/pool.d"

# ---------------------------------------------------------------------------
# API / service defaults
# ---------------------------------------------------------------------------
API_BIND_HOST="127.0.0.1"
API_BIND_PORT="8000"
API_USER="vpsmgr-api"
API_VENV="/opt/vpsmgr/venv"
API_HOME="/var/lib/vpsmgr"

# ---------------------------------------------------------------------------
# Defaults used by provisioning scripts
# ---------------------------------------------------------------------------
DEFAULT_DB_ENGINE="mariadb"
DEFAULT_PHP_VERSION="current"
BACKUP_RETENTION_DAYS="30"
LOG_RETENTION_DAYS="30"
SFTP_USER_PREFIX="site_"
SFTP_SHELL="/bin/false"

# ---------------------------------------------------------------------------
# Tokens (must be set via environment, never here)
# ---------------------------------------------------------------------------
# VPSMGR_API_TOKEN=

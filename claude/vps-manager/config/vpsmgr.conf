# VPS Manager Configuration
# Sourced by scripts and API at runtime

# Installation & runtime paths (resolved/created at bootstrap)
CONFIG_DIR="/etc/vpsmgr"
LOG_DIR="/var/log/vpsmgr"
STATE_DIR="/var/lib/vpsmgr/sites"
BACKUP_DIR="/var/backups/vpsmgr"

# Service & daemon configuration
CADDY_CONFIG_DIR="/etc/caddy/sites"
PHP_POOL_DIR="/etc/php"  # version-specific: resolved at bootstrap
SFTP_CHROOT_BASE="/home"

# PHP defaults (resolved at bootstrap time)
PHP_DEFAULT_VERSION=""  # will be set to latest stable during bootstrap
PHP_FALLBACK_VERSION="" # will be set to previous minor during bootstrap

# PostgreSQL defaults
POSTGRES_REPO="deb [signed-by=/usr/share/keyrings/postgresql-archive-keyring.gpg] http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main"

# Caddy defaults
CADDY_REPO="deb [signed-by=/usr/share/keyrings/caddy-archive-keyring.gpg] http://apt.everyday.moe/caddy/debian bookworm main"

# MariaDB defaults
MARIADB_KEYRING="/usr/share/keyrings/mariadb-archive-keyring.gpg"

# Backup defaults
BACKUP_RETENTION_DAYS=30
BACKUP_COMPRESSION="xz"
BACKUP_OWNERSHIP="root:root"
BACKUP_PERMS="0600"

# API configuration
API_BIND_HOST="127.0.0.1"
API_BIND_PORT=8000
API_WORKERS=4

# Default site configuration
DEFAULT_SITE_TYPE="static"
DEFAULT_PHP_VERSION=""  # resolved at bootstrap
SFTP_USER_PREFIX=""  # generated from domain at site creation

# Logging
LOG_LEVEL="INFO"
LOG_FORMAT="%(asctime)s [%(levelname)s] %(name)s: %(message)s"

# Feature flags (v1 baseline)
FEATURE_ASYNC_JOBS=false
FEATURE_OFFSITE_BACKUPS=false
FEATURE_BACKUP_ENCRYPTION=false

# vpsmgr.conf — Master configuration for VPS Manager
# Sourced by all scripts via lib/common.sh

# Paths
CONFIG_DIR="/etc/vpsmgr"
LOG_DIR="/var/log/vpsmgr"
STATE_DIR="/var/lib/vpsmgr/sites"
BACKUP_DIR="/var/backups/vpsmgr"
CADDY_SITES_DIR="/etc/caddy/sites"
SCRIPT_DIR="/usr/local/lib/vpsmgr/scripts"
TEMPLATE_DIR="/usr/local/lib/vpsmgr/templates"

# Caddy
CADDY_STABLE_REPO="deb [signed-by=/usr/share/keyrings/caddy-stable-archive-keyring.gpg] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
CADDY_KEY_URL="https://dl.cloudsmith.io/public/caddy/stable/gpg.key"
CADDY_KEYRING="/usr/share/keyrings/caddy-stable-archive-keyring.gpg"

# PHP
PHP_POOL_DIR="/etc/php"
PHP_FPM_SERVICE="php{ver}-fpm"
PHP_FPM_USER="www-data"
PHP_FPM_GROUP="www-data"

# MariaDB
MARIADB_REPO="deb [signed-by=/usr/share/keyrings/mariadb-keyring.gpg] https://mirror.mariadb.org/repo/latest/ubuntu noble main"
MARIADB_KEY_URL="https://mariadb.org/mariadb_release_signing_key.asc"
MARIADB_KEYRING="/usr/share/keyrings/mariadb-keyring.gpg"

# PostgreSQL
PGDG_REPO="deb [signed-by=/usr/share/keyrings/pgdg-keyring.gpg] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main"
PGDG_KEY_URL="https://www.postgresql.org/media/keys/ACCC4CF8.asc"
PGDG_KEYRING="/usr/share/keyrings/pgdg-keyring.gpg"

# Site defaults
SITE_BASE_HOME="/home"
SITE_SHELL="/usr/sbin/nologin"

# Backup retention
BACKUP_RETENTION_DAYS=30
BACKUP_PRUNE_CRON="0 2 * * *"

# API
API_HOST="127.0.0.1"
API_PORT="8000"
API_TOKEN_FILE="/etc/vpsmgr/api.token"
API_USER="vpsmgr-api"
API_GROUP="vpsmgr-api"

# Logging
LOG_REDACT_PATTERNS="password|secret|token|DB_PASSWORD|SFTP_PASSWORD|AUTH_KEY|SECURE_AUTH_KEY|LOGGED_IN_KEY|NONCE_KEY|AUTH_SALT|SECURE_AUTH_SALT|LOGGED_IN_SALT|NONCE_SALT"
# VPS Manager — Main Configuration
# Installed to /etc/vpsmgr/vpsmgr.conf by bootstrap.sh

# --- Paths ---
state_dir=/var/lib/vpsmgr/sites
log_dir=/var/log/vpsmgr
backup_dir=/var/backups/vpsmgr
webroot_base=/home
caddy_sites_dir=/etc/caddy/sites

# --- API ---
api_host=127.0.0.1
api_port=8000
api_token=

# --- PHP ---
php_default_version=

# --- Database ---
db_root_user=root
db_root_password=

# --- Retention ---
backup_retention_days=30

# /etc/vpsmgr/vpsmgr.conf
# Central configuration for the VPS Manager toolkit.
# Sourced by lib/common.sh. Values are shell variables.

# --- Paths -----------------------------------------------------------------
VPSMGR_CONFIG_DIR="/etc/vpsmgr"
VPSMGR_LOG_DIR="/var/log/vpsmgr"
VPSMGR_STATE_DIR="/var/lib/vpsmgr/sites"
VPSMGR_BACKUP_DIR="/var/backups/vpsmgr"
VPSMGR_CADDY_SITES_DIR="/etc/caddy/sites"
VPSMGR_CADDY_MAIN_CONF="/etc/caddy/Caddyfile"
VPSMGR_TEMPLATES_DIR="/usr/local/share/vpsmgr/templates"

# --- Web -------------------------------------------------------------------
# Home base for site users' home directories is /home (standard Linux).
VPSMGR_HOME_BASE="/home"

# --- PHP -------------------------------------------------------------------
# Minimum supported PHP version (major.minor). EOL versions (7.x) unsupported.
VPSMGR_PHP_MIN_MAJOR=8
VPSMGR_PHP_MIN_MINOR=4
# Fallback = previous minor only. Computed dynamically in lib/php.sh.

# --- Database engines available -------------------------------------------
# Comma-separated. "mariadb" and "postgresql" supported in v1.
VPSMGR_DB_ENGINES="mariadb,postgresql"

# --- SFTP ------------------------------------------------------------------
# Shell given to site SFTP users. nologin-style shell restricted to SFTP.
VPSMGR_SFTP_SHELL="/usr/sbin/nologin"

# --- Backups ---------------------------------------------------------------
# Number of daily backup archives to retain per site before pruning.
VPSMGR_BACKUP_RETENTION_DAYS=7
# Archive permissions. 0600 per D8 (no encryption in v1).
VPSMGR_BACKUP_MODE="0600"

# --- API -------------------------------------------------------------------
# uvicorn binds to loopback only (D2). No external exposure in v1.
VPSMGR_API_HOST="127.0.0.1"
VPSMGR_API_PORT="8000"
# Auth token file (chmod 600). Created by bootstrap if missing.
VPSMGR_API_TOKEN_FILE="/etc/vpsmgr/api.token"

# --- Logging ---------------------------------------------------------------
# Redaction patterns (extended regex). Matched against log lines before write.
# These cover the credential markers and common secret shapes.
VPSMGR_REDACT_PATTERNS="<<<CREDENTIALS>>>.*<<<END CREDENTIALS>>>;password=[^[:space:]]+;DB_PASSWORD='[^']*';passwd: [^[:space:]]+"

# --- Caddy -----------------------------------------------------------------
# Channel: stable only (D10).
VPSMGR_CADDY_CHANNEL="stable"

# --- WordPress -------------------------------------------------------------
# WP-CLI install path (phar). Bootstrap downloads if absent.
VPSMGR_WPCLI_PATH="/usr/local/bin/wp"
